<!DOCTYPE html>
<html lang="en"> 

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="div2">
        <div class="cadastro-box">
            <h2 class="rune-top">ᛖᚢᛟᛚᚢᛏᛟᚾ</h2>
            <h1 class="title">A S C E N D</h1>

            <p class="subtitle">Preencha os campos abaixo para criar sua conta</p>
            <form>
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Digite seu email">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar Senha</label><span id="mensagem"></span>
                    <input type="password" id="confirm_password" placeholder="Confirme sua senha">
                </div>
                <button type="button" class="login-btn" onclick="cadastrarUsuario(event)">
                    CADASTRAR
                </button>
            </form>
            <p class="signup-link"> Já possui conta? <a href="login1.html">Faça login</a> </p>
            <div class="rune-bottom">ᛁ ᚢ ᚬ ᛚ ᚢ ᛏ ᚬ ᚾ</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>

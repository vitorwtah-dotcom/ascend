<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assistir.css">
</head>

<body>
    <header id="cabecalho">
        <h3 onclick="window.location.href='feed.html'">Home</h3>
        <div>
            <button id="buttonGerar" onclick="gerarMensagem()">Motivação</button>
            <input type="text" id="mensagem" placeholder="Inspire-se...">
        </div>
        <i class="fa-solid fa-user" id="icone" onclick="window.location.href='perfil.html'"></i><span id="msperfil"
            style="display: none;">Perfil</span>
    </header>
    <div id="conteudo">
        <div id="videoContainer">
            <video id="player" controls></video>

            <h1 id="tituloVideo"></h1>
            <p id="visualizacoesVideo"></p>

            <button onclick="darLike()" id="botaoLike">
                👍 Curtir
            </button>

            <span id="totalLikes">0 likes</span>

            <div id="informacoes">
                <img id="fotoAutor" width="40" height="40" style="border-radius: 50%; object-fit: cover;"></img>
                <p id="usuarioVideo"></p>
            </div>
            <p id="dataVideo"></p>
            <p id="descricaoVideo"></p>
        </div>
    </div>


    <script src="script.js"></script>
    <script src="api.js"></script>
</body>

</html>

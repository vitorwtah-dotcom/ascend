<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="divi1">
        <div class="login-box">
            <div class="rune-top">ᛅ ᛋ ᚴ ᛁ ᚾ ᛏ</div>

            <h1 class="title">A S C E N D</h1>
            <p class="subtitle">Seja bem-vindo de volta!</p>

            <form onsubmit="loginUsuario(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email_login" placeholder="Seu email" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password_login" placeholder="Sua senha" required>
                </div>
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox"><span>Lembrar-me</span>
                    </label>
                    <a href="" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="login-btn">
                    ENTRAR
                </button>
            </form>

            <p class="signup-link"> Não possui conta? <a href="cadastro.html">Crie uma agora</a> </p>

            <div class="rune-bottom">ᛁ ᚢ ᚬ ᛚ ᚢ ᛏ ᚬ ᚾ</div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>

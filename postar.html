<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <title>Postar Vídeo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container" id="postarVideo">

        <div class="preview">
            <video id="videoPreview" controls></video>
        </div>

        <form id="formPost" class="formulario">
            <input type="text" id="titulo" name="titulo" placeholder="Título">
            <input type="text" id="categoria" name="categoria" placeholder="Categoria">
            <textarea id="descricao" name="descricao" placeholder="Descrição"></textarea>
            <label> Escolha o vídeo </label>
            <input type="file" id="video" name="video" accept="video/*">
            <label> Escolha a thumbnail </label>
            <input type="file" id="thumbnail"  name="thumbnail" accept="image/*">
            <button type="submit"> Publicar </button>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Gamer RPG</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="pagina">
        <button id="voltar" type="button" onclick="window.location.href='feed.html'">Voltar ao início</button>
        <section id="topo">
            <div id="banner" style="cursor: pointer;">
                <img id="bannerPerfil" alt="Banner do Usuário" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div id="perfil">
                <div id="foto-perfil" style="cursor: pointer;">
                    <img id="fotoPerfil" alt="Foto de Perfil" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
            </div>
            <div id="info-principal">
                <h1 id="nomeUsuario"></h1>
                    <div class="botoesPerfil">
                        <button class="btn-sair" id="botaoEditar" onclick="abrirModal()">Editar perfil</button>
                        <button class="btn-sair" onclick="deslogConta()">Sair</button>
                    </div>
                    <p id="bioPerfil"></p>
                </div>
            </div>
            <div id="info-rapida">
                <div class="card-info"><strong>48k</strong><span>Seguidores</span></div>
                <div class="card-info"><strong>72</strong><span>Vídeos</span></div>
            </div>
        </section>
        <div id="modalPerfil">

            <form id="formPerfil" enctype="multipart/form-data">
                <div id="modalHeader">
                    <p>Atualize sua foto de perfil:</p>
                    <input type="file" name="foto_perfil" accept="image/*">
                    <p>Atualize seu banner:</p>
                    <input type="file" name="banner" accept="image/*">
                    <p>Escreva sua bio:</p>
                    <textarea name="bio" placeholder="Fale sobre você..."></textarea>
                    <div>
                        <button class="btn-sair" type="submit">Salvar</button>
                        <button class="btn-sair" type="button" onclick="fecharModal()">Cancelar</button>
                    </div>
                </div>


            </form>

        </div>

        <script src="script.js"></script>
        <script src="perfil.js"></script>
</body>

</html>
